services:
  idp-backend:
    image: ghcr.io/gayabarumalamselatan/integrated-deployment-platform-backend:main
    build:
      context: ./idp-backend
    container_name: idp-backend
    # ports:
    #   - "8080:8080" # Removed for production-safe internal-only access
    env_file:
      - ./idp-backend/.env
    volumes:
      - /etc/rancher/k3s/k3s.yaml:/root/.kube/config:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - KUBECONFIG=/root/.kube/config
      - GIN_MODE=release
    restart: always

  idp-frontend:
    image: ghcr.io/gayabarumalamselatan/integrated-deployment-platform-frontend:main
    build:
      context: ./idp-frontend
      args:
        - NEXT_PUBLIC_API_URL= # Empty for relative paths
    container_name: idp-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./idp-frontend/.env
    depends_on:
      - idp-backend
    restart: always

networks:
  default:
    name: idp-network
